services:
  spark:
    image: spark:python3-java17
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - '8081:8080'
      - '7077:7077'
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/output:/opt/spark/output
      - ./src:/opt/spark/src
    env_file:
      - .env.docker

  spark-worker:
    image: spark:python3-java17
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077
    depends_on:
      - spark
    environment:
      # Must leave room in the ~8G Docker VM for MongoDB and Airflow
      - SPARK_WORKER_MEMORY=3G
      - SPARK_WORKER_CORES=4
    volumes:
      - ./spark/output:/opt/spark/output

  mongo:
    image: mongo
    restart: unless-stopped
    # The Docker VM only has ~8G shared by all services. Without these caps,
    # WiredTiger sizes its cache off the whole VM (~3.4G) and mongod gets
    # OOM-killed by the VM's global OOM killer during large Spark reads.
    command: ["--wiredTigerCacheSizeGB", "0.75"]
    mem_limit: 2g
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express
    restart: unless-stopped
    ports:
      - 8082:8081
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS}

  airflow-init:
    build: ./airflow
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./datasets:/opt/airflow/datasets
      - airflow_db:/opt/airflow
    depends_on:
      mongo:
        condition: service_started
    command: >
      bash -c "airflow db migrate && airflow users create \
      --username ${AIRFLOW_USER} \
      --password ${AIRFLOW_PASSWORD} \
      --firstname Admin \
      --lastname User \
      --role Admin \
      --email djmbiana@gmail.com"
    user: "0:0"

  airflow-scheduler:
    build: ./airflow
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API__BASE_URL: 'http://airflow-apiserver:8080'
      AIRFLOW__CORE__INTERNAL_API_URL: 'http://airflow-apiserver:8080'
      AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./datasets:/opt/airflow/datasets
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_db:/opt/airflow
    command: scheduler
    depends_on:
      mongo:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-apiserver:
    build: ./airflow
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./datasets:/opt/airflow/datasets
      - airflow_db:/opt/airflow
    command: api-server
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-triggerer:
    build: ./airflow
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./datasets:/opt/airflow/datasets
      - airflow_db:/opt/airflow
    command: triggerer
    depends_on:
      mongo:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-dag-processor:
    build: ./airflow
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow_db:/opt/airflow
    command: dag-processor
    depends_on:
      mongo:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  mongo_data:
  airflow_db:
